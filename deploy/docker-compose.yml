services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      APP_NAME: Task Exchange Platform
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://taskhub:taskhub@db:5432/taskhub
      STORAGE_ROOT: /app/data/files
      MAX_UPLOAD_SIZE_MB: "100"
    volumes:
      - ../data:/app/data
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: taskhub
      POSTGRES_USER: taskhub
      POSTGRES_PASSWORD: taskhub
    volumes:
      - postgres-data:/var/lib/postgresql/data

  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app

volumes:
  postgres-data:
